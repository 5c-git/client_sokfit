  <body>
    <main>
<section class="plug">
  <div class="plug__main">
    <figure class="plug__logo"><img src="./assets/images/logo--black.svg" alt=""></figure>
    <div>
      <p class="plug__text">Старт предпродаж клубных карт</p><a class="plug__link" href="tel:88463131313">8 (846) 313-13-13</a>
    </div>
  </div>
  <figure class="plug__banner"><img src="./assets/images/plug-1.jpg" alt=""></figure>
</section>
    </main><div id='RequestModalProvider' class='RequestModalProvider'></div>
<section class="alert-wrapper"></section>
    <template id="cookie">
<section class="popUp cookie">
  <div class="popUp__overlay cookie__overlay"></div>
  <div class="container">
    <div class="popUp__wrapper cookie__wrapper">
      <div class="cookie__header"> 
        <h2 class="cookie__title">Мы используем cookies!</h2>
        <button class="popUp__close cookie__close" type="button" aria-label="Закрыть"><span></span></button>
      </div>
      <div class="cookie__main">
        <p>Мы используем cookies, чтобы пользоваться сайтом было удобно. Более подробную информацию можно найти в <a href="#" target="_blank" rel=" noopener noreferrer">Политике конфиденциальности</a>.</p>
      </div>
    </div>
  </div>
</section>
    </template>
    <div>
      <template id="alert--request">
            <section class="alert alert--request">
              <div class="alert__container">
                <p><b>Заявка отправлена!</b> <br>Наш менеджер свяжется с&nbsp;вами и&nbsp;проконсультирует о&nbsp;дальнейших шагах.</p>
              </div>
              <button class="alert__close" type="button" arial-label="Закрыть всплывающее окно"><span></span></button>
            </section>
      </template>
      <template id="alert--error">
            <section class="alert alert--error">
              <div class="alert__container">
                <p><b>Заявка не отправлена!</b> <br>Что-то пошло не так, повторите попытку позже.</p>
              </div>
              <button class="alert__close" type="button" arial-label="Закрыть всплывающее окно"><span></span></button>
            </section>
      </template>
      <template id="alert--wrongtypefile">
            <section class="alert alert--wrongtypefile">
              <div class="alert__container">
                <p><b>Неверное расширение файла!</b> <br>Допускается не более 3-х файлов в формате jpeg, .gif, .png, .pdf, .doc, .docx. Размер файлов не более 10 MB.</p>
              </div>
              <button class="alert__close" type="button" arial-label="Закрыть всплывающее окно"><span></span></button>
            </section>
      </template>
      <template id="alert--wrongcountfile">
            <section class="alert alert--wrongcountfile">
              <div class="alert__container">
                <p><b>Превышен лимит файлов!</b> <br>Допускается не более 3-х файлов в формате jpeg, .gif, .png, .pdf, .doc, .docx. Размер файлов не более 10 MB.</p>
              </div>
              <button class="alert__close" type="button" arial-label="Закрыть всплывающее окно"><span></span></button>
            </section>
      </template>
      <template id="alert--copy">
            <section class="alert alert--copy">
              <div class="alert__container">
                <p><b>Ссылка скопирована</b></p>
              </div>
              <button class="alert__close" type="button" arial-label="Закрыть всплывающее окно"><span></span></button>
            </section>
      </template>
    </div>
    <div>
      <template id="modal--card">
            <section class="popUp modal modal--card">
              <div class="popUp__overlay modal__overlay"></div>
              <section class="popUp__container modal__container">
                <div class="popUp__wrapper modal__wrapper">
                  <button class="popUp__close modal__close"><span></span></button>
                      <div class="request-wrapper">
                        <div class="request-wrapper__media">
                          <figure> <img src="./assets/images/image-4.jpg" alt=""></figure>
                        </div>
                        <div class="request-wrapper__main">
                          <div class="request-wrapper__content">
                                <div class="request">
                                  <h2 class="request__title">Оставьте заявку</h2>
                                  <form class="request__form" action="#" method="post">
                                    <div class="request__fields">
                                      <div class="request__field">
                                            <div class="field">
                                              <label class="validator__description field__label" for="name"></label>
                                              <div class="field__inner">
                                                <input class="validator__required field__input" type="text" name="name" id="name" autocomplete="off" autocapitalize="off" placeholder="Имя">
                                              </div>
                                              <div class="validator__error-container field__error"></div>
                                            </div>
                                      </div>
                                      <div class="request__field"> 
                                            <div class="field">
                                              <label class="validator__description field__label" for="Phone Number"></label>
                                              <div class="field__inner">
                                                <input class="validator__phone field__input" type="tel" name="Phone Number" id="Phone Number" autocomplete="off" autocapitalize="off" placeholder="Телефон">
                                              </div>
                                              <div class="validator__error-container field__error"></div>
                                            </div>
                                      </div>
                                      <div class="request__field">
                                        <button class="button button--black" type="submit">Отправить</button>
                                      </div>
                                    </div>
                                    <div class="request__legal">
                                      <div class="request__legal-check">
                                            <div class="checkbox">
                                              <label class="checkbox__label">
                                                <input class="visually-hidden" type="checkbox" name="legal-1" required><span class="checkbox__box"></span>
                                              </label>
                                            </div>
                                        <p>Я соглашаюсь на <a href="#" target="_blank">обработку персональных данных </a>  согласно  <a href="#" target="_blank"> политике конфиденциальности</a>.</p>
                                      </div>
                                      <div class="request__legal-check">
                                            <div class="checkbox">
                                              <label class="checkbox__label">
                                                <input class="visually-hidden" type="checkbox" name="legal-2" required><span class="checkbox__box"></span>
                                              </label>
                                            </div>
                                        <p>Я даю  <a href="#" target="_blank"> cогласие </a>  на получение информационной и рекламной рассылки.</p>
                                      </div><span>* сайт собирает персональные данные с помощью сервиса аналитики Яндекс метрика для анализа посещаемости сайта, улучшения его функциональности, таргетинга рекламы</span>
                                    </div><a class="button" href="#">Написать в ТГ </a>
                                  </form>
                                </div>
                          </div>
                        </div>
                      </div>
                </div>
              </section>
            </section>
      </template>
      <template id="modal--more">
            <section class="popUp modal modal--more">
              <div class="popUp__overlay modal__overlay"></div>
              <section class="popUp__container modal__container">
                <div class="popUp__wrapper modal__wrapper">
                  <button class="popUp__close modal__close"><span></span></button>
                </div>
              </section>
            </section>
      </template>
    </div>
